name: Deploy tag to Railway

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Create environment and deploy
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Deploying tag $TAG as Railway environment: $TAG"

          # Link to the project
          railway link --project "$RAILWAY_PROJECT_ID"

          # Create new environment by duplicating production
          railway environment "$TAG" 2>/dev/null || echo "Environment may already exist, continuing..."

          # Deploy to the tag environment
          railway up \
            --environment "$TAG" \
            --service Conversational-Email-Editor \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

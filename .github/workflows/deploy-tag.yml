name: Deploy tag to Railway

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - uses: actions/checkout@v4

      - name: Link to project
        run: railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

      - name: Create environment for tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Creating environment: $TAG"
          railway environment new "$TAG" --copy production || echo "Environment $TAG may already exist, continuing..."
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

      - name: Deploy to tag environment
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Deploying to environment: $TAG"
          railway up \
            --environment "$TAG" \
            --service Conversational-Email-Editor \
            --detach
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

      - name: Generate domain for tag environment
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Generating domain for environment: $TAG"
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment "$TAG"
          railway domain --service Conversational-Email-Editor
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
